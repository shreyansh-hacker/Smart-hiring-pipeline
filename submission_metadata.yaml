ai_usage_summary: |
  Used Gemini 3.5 via Antigravity to architect the hybrid scoring model, debug python script configurations, and design the honeypot detection rules. No candidate data was sent to any external API during ranking.

methodology_summary: |
  A hybrid candidate ranking engine driven by a TF-IDF cosine semantic similarity model, built using scikit-learn, combined with rule-based feature scores (skills, experience, career trajectory, location, notice period, and salary). Includes a strict honeypot filter using contradiction checks (such as salary range mismatches and expert skill duration errors) to disqualify invalid profiles. Applies behavioral engagement scores as a final rank modifier. The system processes 100K candidates under 40 seconds on standard CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
